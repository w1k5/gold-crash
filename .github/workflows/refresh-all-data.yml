name: Refresh All Data

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    strategy:
      fail-fast: false
      matrix:
        workflow_file:
          - daily.yml
          - silver.yml
          - dislocation.yml
    steps:
      - name: Trigger ${{ matrix.workflow_file }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "${{ matrix.workflow_file }}",
              ref: context.ref.replace("refs/heads/", "") || "main",
            });
